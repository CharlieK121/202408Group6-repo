<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOLARPATH | LOGIN</title>
    <link rel="stylesheet" href="../Styles/_base.css">
    <link rel="stylesheet" href="../Styles/_header.css">
    <link rel="stylesheet" href="../Styles/_dropdown.css">
    <link rel="stylesheet" href="../Styles/_tabs.css">
    <link rel="stylesheet" href="../Styles/_buttons.css">
    <link rel="stylesheet" href="../Styles/_responsive.css">
    <link rel="stylesheet" href="../Styles/_form.css">
    <script src="../Scripts/_dropdown.js" defer></script>
    <script src="../Scripts/_tabs.js" defer></script>
</head>

<body>
    <!-- Header Section -->
    <div class="header-main">
        <div class="header-main-logo">
            <img src="../Resources/Images/_scholarpathw&b.png" alt="Logo">
        </div>
        <div class="header-main-login">
            <ul>
                <li><a href="_map.html">MAP</a></li>
                <li><a href="_profile.html">PROFILE</a></li>
                <li class="dropdown-toggle" tabindex="0">
                    <a href="#" aria-expanded="false">RESOURCES</a>
                    <ul class="dropdown" aria-hidden="true">
                        <li><a href="_studyGroup.html">MYSTUDYGROUP</a></li>
                        <li><a href="_favorites.html">MYFAVORITES</a></li>
                        <li><a href="_events.html">MYEVENTS</a></li>
                    </ul>
                </li>
            </ul>
            <ul>
                <li><a href="_aboutUs.html">ABOUT US</a></li>
                <li class="dropdown-toggle" tabindex="0">
                    <a href="#" aria-expanded="false">SETTINGS</a>
                    <ul class="dropdown" aria-hidden="true">
                        <li><a href="_security.html">SECURITY</a></li>
                        <li><a href="_password.html">PASSWORD</a></li>
                    </ul>
                </li>
                <li><a href="_index.html">LOGIN</a></li>
            </ul>
        </div>
    </div>
    <!-- Form Section -->
    <div class="wrapper">
        <div class="form-box">
            <!-- Login Form -->
            <div class="login-container active" id="login">
                <h3 class="mb-4">LOG IN</h3>
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Username or Email">
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Password">
                    <i class="bx bx-lock-alt"></i>
                </div>
                <div class="input-box">
                    <input type="submit" class="submit" value="Sign In">
                </div>
                <div class="two-col">
                    <div class="one">
                        <input type="checkbox" id="login-check">
                        <label for="login-check"> Remember Me</label><br> 
                        <label>Don't have an account?<a href="#" onclick="register()">Sign Up</a></label>
                    </div>
                    <div>
                        <label><a href="_password.html" onclick="navigateToForgotPassword(event)">Forgot password?</a></label>
                    </div>
                    <div>
                        <label><a href="_termsAndConditions.html" onclick="navigateToTermsAndConditions(event)">Terms & Conditions</a></label>
                    </div>
                </div>
            </div>

            <!-- Register Form -->
            <div id="register" class="login-container">
                <h3 class="mb-4">SIGN UP</h3>
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Email">
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Password">
                    <i class="bx bx-lock-alt"></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Confirm Password">
                    <i class="bx bx-lock-alt"></i>
                </div>
                <div class="input-box">
                    <input type="submit" class="submit" value="Register">
                </div>
                <div class="two-col">
                    <div class="one">
                        <input type="checkbox" id="register-check">
                        <label for="register-check"> Remember Me</label><br> 
                        <label>Have an account? <a href="#" onclick="login()">Login</a></label>
                    </div>
                    <div>
                        <label><a href="_termsAndConditions.html" onclick="navigateToTermsAndConditions(event)">Terms & Conditions</a></label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
