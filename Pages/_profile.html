<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOLARPATH | LOGIN</title>
    <link rel="stylesheet" href="../Styles/_base.css">
    <link rel="stylesheet" href="../Styles/_header.css">
    <link rel="stylesheet" href="../Styles/_dropdown.css">
    <link rel="stylesheet" href="../Styles/_tabs.css">
    <link rel="stylesheet" href="../Styles/_buttons.css">
    <link rel="stylesheet" href="../Styles/_responsive.css">
    <link rel="stylesheet" href="../Styles/_form.css">
    <script src="../Scripts/_dropdown.js" defer></script>
    <script src="../Scripts/_tabs.js" defer></script>
</head>

<body>
    <!-- Header Section -->
    <div class="header-main">
        <div class="header-main-logo">
            <img src="../Resources/Images/_scholarpathw&b.png" alt="Logo">
        </div>
        <div class="header-main-login">
            <ul>
                <li><a href="_map.html">MAP</a></li>
                <li><a href="_profile.html">PROFILE</a></li>
                <li class="dropdown-toggle" tabindex="0">
                    <a href="#" aria-expanded="false">RESOURCES</a>
                    <ul class="dropdown" aria-hidden="true">
                        <li><a href="_studyGroup.html">MYSTUDYGROUP</a></li>
                        <li><a href="_favorites.html">MYFAVORITES</a></li>
                        <li><a href="_events.html">MYEVENTS</a></li>
                    </ul>
                </li>
            </ul>
            <ul>
                <li><a href="_aboutUs.html">ABOUT US</a></li>
                <li class="dropdown-toggle" tabindex="0">
                    <a href="#" aria-expanded="false">SETTINGS</a>
                    <ul class="dropdown" aria-hidden="true">
                        <li><a href="_security.html">SECURITY</a></li>
                        <li><a href="_password.html">PASSWORD</a></li>
                    </ul>
                </li>
                <li><a href="_index.html">LOGIN</a></li>
            </ul>
        </div>
    </div>
    <!-- FormBox Class -->
    <div class="wrapper">
        <!-- Wrapper Class -->
        <div class="form-box">
            <!-- Tab Content -->
            <div class="content-box">
                <!-- Profile Box -->
                <div class="profile-box">
                    <div class="text-center p-4">
                        <div class="img-circle mb-3">
                            <img src="../Resources/Images/_profile.jpg" alt="profile" class="profile-image">
                        </div>
                        <h4>YOUR NAME HERE</h4>
                    </div>
                </div>

                <!-- Content Box -->
                <div class="content-box p-4">
                    <h3 class="mb-4">Profile Settings</h3>
                    <div class="input-box">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" class="input-field" value="Jane">
                            </div>
                        </div>
                        <div class="input-box">
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" class="input-field" value="Doe">
                            </div>
                        </div>
                        <div class="input-box">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="text" class="input-field" value="fakeusername@calstatela.edu">
                            </div>
                        </div>
                        <div class="input-box">
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="text" class="input-field" value="213-456-7891">
                            </div>
                        </div>
                        <div class="input-box">
                            <div class="form-group">
                                <label>Joined</label>
                                <input type="text" class="input-field" value="11/07/2024">
                            </div>
                        </div>
                        <div class="input-box">
                            <div class="form-group">
                                <label>Bio</label>
                                <textarea class="input-field" rows="4">Hello I am on ScholarPath</textarea>
                            </div>
                        </div>
                    </div>
                    <div>
                        <button class="submit">Update</button>
                        <button class="submit">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- Add the missing element here -->
            <div id="account-tab" class="tab-pane fade" role="tabpanel">
                <!-- Content for the account tab -->
            </div>
        </div>
    </div>
</body>

</html>
